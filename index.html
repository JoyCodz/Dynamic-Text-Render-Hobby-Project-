<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pretext Dynamic Wrap - Interactive Sandbox</title>
  <style>
    body {
      background-color: #111;
      color: white;
      margin: 0;
      font-family: sans-serif;
      overflow: hidden;
    }

    canvas {
      background-color: #222;
      display: block;
    }

    video {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0.01;
      pointer-events: none;
      z-index: -1;
    }

    /* --- Interactive Menu Styles --- */
    #start-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .panel {
      background: #222;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
      border: 1px solid #444;
    }

    .panel h2 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #aaa;
    }

    input[type="file"],
    textarea {
      width: 100%;
      padding: 10px;
      background: #111;
      border: 1px solid #444;
      color: white;
      border-radius: 6px;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    textarea {
      resize: vertical;
    }

    #start-btn {
      padding: 15px 40px;
      font-size: 20px;
      font-weight: bold;
      background: #ff4757;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
      transition: transform 0.2s;
    }

    #start-btn:hover:not(:disabled) {
      transform: scale(1.02);
    }

    #start-btn:disabled {
      background: #555;
      cursor: not-allowed;
      box-shadow: none;
    }

    .text-container {
      max-width: 800px;
      width: 100%;
      padding: 15px;
      box-sizing: border-box;
      text-align: justify;
      line-height: 1.5;
    }

    .dancing-character {
      float: left;
      width: 40%;
      max-width: 300px;
      min-width: 120px;
      height: auto;
      shape-outside: url('your-transparent-dancing-character.gif');
      shape-image-threshold: 0.5;
      shape-margin: 15px;
    }

    /* --- Footer Styles --- */
    .author-footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: #888;
      font-size: 14px;
      letter-spacing: 1px;
      font-family: monospace;
    }

    @media (max-width: 600px) {
      .dancing-character {
        float: none;
        shape-outside: none;
        display: block;
        margin: 0 auto 20px auto;
        width: 200px;
      }
    }
  </style>
</head>

<body>

  <audio id="bgm" src="song.mp3" loop></audio>
  <video id="dancer" src="chika_dance.webm" loop autoplay muted playsinline></video>
  <canvas id="stage"></canvas>

  <div id="start-screen">
    <div class="panel">
      <h2>Dynamic Wrap Sandbox</h2>

      <div class="input-group">
        <label>Custom Video (.webm with alpha) leave empty for default</label>
        <input type="file" id="video-upload" accept="video/webm">
      </div>

      <div class="input-group">
        <label>Custom Audio (.mp3, .wav) leave empty for default</label>
        <input type="file" id="audio-upload" accept="audio/*">
      </div>

      <div class="input-group">
        <label>Custom Text (Optional)</label>
        <textarea id="text-input" rows="4" placeholder="Leave empty for random Wikipedia article!"></textarea>
      </div>

      <button id="start-btn" disabled>Loading Default Wiki...</button>
    </div>

    <div class="author-footer">Made by Joy Santra (joycodz)</div>
  </div>

  <script type="module">
    import { prepareWithSegments, layoutNextLine } from "https://esm.sh/@chenglou/pretext";

    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const video = document.getElementById("dancer");
    const audio = document.getElementById("bgm");
    const startScreen = document.getElementById("start-screen");
    const startBtn = document.getElementById("start-btn");

    const videoUpload = document.getElementById("video-upload");
    const audioUpload = document.getElementById("audio-upload");
    const textInput = document.getElementById("text-input");

    let dpr = window.devicePixelRatio || 1;
    let logicalWidth = window.innerWidth;
    let logicalHeight = window.innerHeight;

    function resizeCanvas() {
      dpr = window.devicePixelRatio || 1;
      logicalWidth = window.innerWidth;
      logicalHeight = window.innerHeight;
      canvas.style.width = logicalWidth + "px";
      canvas.style.height = logicalHeight + "px";
      canvas.width = logicalWidth * dpr;
      canvas.height = logicalHeight * dpr;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const fontStyle = `${16 * dpr}px Inter, system-ui, sans-serif`;
    const dropCapFont = `bold ${76 * dpr}px Georgia, serif`;
    const lineHeight = 26 * dpr;

    let dropCapChar = "";
    let dropCapWidth = 0;
    let preparedText = null;
    let fallbackWikiText = "";

    async function loadWikipediaText() {
      try {
        const url = "https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&generator=random&grnnamespace=0&prop=extracts&explaintext=1&exchars=3000";
        const response = await fetch(url);
        const data = await response.json();

        const pages = data.query.pages;
        const pageId = Object.keys(pages)[0];
        let text = pages[pageId].extract;

        text = text.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();

        const originalText = text;
        while (text.length < 5000) {
          text += " " + originalText;
        }

        fallbackWikiText = text;
        startBtn.innerText = "Start Animation";
        startBtn.disabled = false;

      } catch (error) {
        console.error("Failed to load Wikipedia:", error);
        startBtn.innerText = "Start (Wiki failed, type custom text)";
        startBtn.disabled = false;
      }
    }

    loadWikipediaText();

    startBtn.addEventListener("click", () => {

      let finalString = textInput.value.trim() !== "" ? textInput.value : fallbackWikiText;

      if (textInput.value.trim() !== "") {
        const ogText = finalString;
        while (finalString.length < 5000) {
          finalString += " " + ogText;
        }
      }

      const match = finalString.match(/[a-zA-Z]/);
      if (match) {
        dropCapChar = finalString.charAt(match.index).toUpperCase();
        finalString = finalString.substring(match.index + 1);
        ctx.font = dropCapFont;
        dropCapWidth = ctx.measureText(dropCapChar).width;
      } else {
        dropCapChar = "";
      }

      preparedText = prepareWithSegments(finalString, fontStyle);

      if (videoUpload.files && videoUpload.files[0]) {
        const file = videoUpload.files[0];
        video.src = URL.createObjectURL(file);
        video.load();
      }

      if (audioUpload.files && audioUpload.files[0]) {
        const audioFile = audioUpload.files[0];
        audio.src = URL.createObjectURL(audioFile);
        audio.load();
      }

      startScreen.style.display = "none";
      video.currentTime = 0;

      video.play().then(() => {
        audio.play();
        requestAnimationFrame(renderFrame);
      }).catch(err => {
        console.log("Play interrupted, recovering...", err);
        requestAnimationFrame(renderFrame);
      });
    });

    function renderFrame() {
      if (video.videoWidth === 0 || video.videoHeight === 0) {
        requestAnimationFrame(renderFrame);
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const isMobile = logicalWidth < 600;
      const margin = (isMobile ? 15 : 40) * dpr;
      const minGap = 30 * dpr;

      const targetHeight = Math.min(450 * dpr, canvas.height * 0.7);
      const ratio = video.videoWidth / video.videoHeight;
      const targetWidth = targetHeight * ratio;

      const videoX = (canvas.width - targetWidth) / 2;
      const videoY = canvas.height - targetHeight;

      ctx.drawImage(video, videoX, videoY, targetWidth, targetHeight);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

      if (dropCapChar) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
        ctx.font = dropCapFont;
        ctx.fillText(dropCapChar, margin, margin + (lineHeight * 2));
      }

      let currentY = margin;
      let textCursor = { segmentIndex: 0, graphemeIndex: 0 };
      const dropCapBottomY = margin + (lineHeight * 2);

      while (currentY < canvas.height - margin) {

        let lineStartX = margin;
        if (currentY <= dropCapBottomY && dropCapChar) {
          lineStartX = margin + dropCapWidth + (8 * dpr);
        }

        const yChecks = [currentY - (18 * dpr), currentY - (9 * dpr), currentY];
        let leftHit = canvas.width;
        let rightHit = 0;

        for (let y of yChecks) {
          const scanY = Math.floor(y);
          if (scanY > 0) {
            for (let x = lineStartX; x < canvas.width - margin; x++) {
              const alphaIndex = (scanY * canvas.width + x) * 4 + 3;
              if (imageData[alphaIndex] > 50) {
                if (x < leftHit) leftHit = x;
                break;
              }
            }
            for (let x = canvas.width - margin; x >= lineStartX; x--) {
              const alphaIndex = (scanY * canvas.width + x) * 4 + 3;
              if (imageData[alphaIndex] > 50) {
                if (x > rightHit) rightHit = x;
                break;
              }
            }
          }
        }

        ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
        ctx.font = fontStyle;
        const padding = (isMobile ? 12 : 20) * dpr;

        if (leftHit < canvas.width && rightHit > 0 && leftHit <= rightHit) {

          let leftWidth = leftHit - lineStartX - padding;
          if (leftWidth > minGap) {
            const leftLine = layoutNextLine(preparedText, textCursor, leftWidth);
            if (leftLine === null) break;
            ctx.fillText(leftLine.text, lineStartX, currentY);
            textCursor = leftLine.end;
          }

          let rightStartX = rightHit + padding;
          let rightWidth = (canvas.width - margin) - rightStartX;
          if (rightWidth > minGap) {
            const rightLine = layoutNextLine(preparedText, textCursor, rightWidth);
            if (rightLine === null) break;
            ctx.fillText(rightLine.text, rightStartX, currentY);
            textCursor = rightLine.end;
          }

        } else {
          let fullWidth = (canvas.width - margin) - lineStartX;
          const line = layoutNextLine(preparedText, textCursor, fullWidth);
          if (line === null) break;
          ctx.fillText(line.text, lineStartX, currentY);
          textCursor = line.end;
        }

        currentY += lineHeight;
      }

      requestAnimationFrame(renderFrame);
    }
  </script>
</body>

</html>

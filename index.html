<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pretext Dynamic Wrap - High-DPI Edition</title>
  <style>
    body {
      background-color: #111;
      color: white;
      margin: 0;
      font-family: sans-serif;
      overflow: hidden; 
    }
    canvas {
      background-color: #222;
      display: block; 
    }
    video { 
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0.01;
      pointer-events: none;
      z-index: -1;
    }
    #start-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    #start-btn {
      padding: 15px 40px;
      font-size: 24px;
      font-weight: bold;
      background: #ff4757;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
      transition: transform 0.2s, background-color 0.2s;
    }
    #start-btn:hover:not(:disabled) { transform: scale(1.05); }
    #start-btn:disabled {
      background: #555;
      cursor: not-allowed;
      box-shadow: none;
    }
  </style>
</head>
<body>

  <audio id="bgm" src="song.mp3" loop></audio>
  <video id="dancer" src="chika_dance.webm" loop autoplay muted playsinline></video>
  <canvas id="stage"></canvas>

  <div id="start-screen">
    <button id="start-btn" disabled>Loading Wikipedia...</button>
  </div>

  <script type="module">
    import { prepareWithSegments, layoutNextLine } from "https://esm.sh/@chenglou/pretext";

    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const video = document.getElementById("dancer");
    const audio = document.getElementById("bgm");
    const startScreen = document.getElementById("start-screen");
    const startBtn = document.getElementById("start-btn");

    // --- FIX 1: High-DPI Canvas Sizing ---
    let dpr = window.devicePixelRatio || 1;
    let logicalWidth = window.innerWidth;
    let logicalHeight = window.innerHeight;

    function resizeCanvas() {
      dpr = window.devicePixelRatio || 1;
      logicalWidth = window.innerWidth;
      logicalHeight = window.innerHeight;
      
      // CSS controls the physical size on the screen
      canvas.style.width = logicalWidth + "px";
      canvas.style.height = logicalHeight + "px";
      
      // The internal canvas resolution is multiplied by the screen's pixel density
      canvas.width = logicalWidth * dpr;
      canvas.height = logicalHeight * dpr;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); 

    // We scale our fonts by the DPR so Pretext measures them accurately
    const fontStyle = `${16 * dpr}px Inter, system-ui, sans-serif`;
    const dropCapFont = `bold ${76 * dpr}px Georgia, serif`;
    const lineHeight = 26 * dpr;
    
    let dropCapChar = "";
    let dropCapWidth = 0;
    let preparedText = null; 

    async function loadWikipediaText() {
      try {
        const url = "https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&generator=random&grnnamespace=0&prop=extracts&explaintext=1&exchars=3000";
        const response = await fetch(url);
        const data = await response.json();
        
        const pages = data.query.pages;
        const pageId = Object.keys(pages)[0];
        let text = pages[pageId].extract;

        text = text.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
        
        // --- FIX 2: Smart Text Repetition ---
        // Dynamically append text until we reach a safe threshold (e.g., 5000 characters)
        const originalText = text;
        while (text.length < 5000) {
            text += " " + originalText;
        }

        const match = text.match(/[a-zA-Z]/);
        if (match) {
          dropCapChar = text.charAt(match.index).toUpperCase();
          text = text.substring(match.index + 1); 
          ctx.font = dropCapFont;
          dropCapWidth = ctx.measureText(dropCapChar).width;
        }

        preparedText = prepareWithSegments(text, fontStyle);
        startBtn.innerText = "Click to Start";
        startBtn.disabled = false;

      } catch (error) {
        console.error("Failed to load Wikipedia:", error);
        startBtn.innerText = "Error loading. Refresh page.";
      }
    }

    loadWikipediaText();

    startBtn.addEventListener("click", () => {
      if (!preparedText) return; 
      startScreen.style.display = "none";
      video.currentTime = 0; 
      
      video.play().then(() => {
        audio.play();
        requestAnimationFrame(renderFrame);
      }).catch(err => {
        console.log("Play interrupted, recovering...", err);
        requestAnimationFrame(renderFrame);
      });
    });

    function renderFrame() {
      if (video.videoWidth === 0 || video.videoHeight === 0) {
        requestAnimationFrame(renderFrame);
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // All positional math must now be multiplied by DPR to stay accurate!
      const isMobile = logicalWidth < 600;
      const margin = (isMobile ? 15 : 40) * dpr; 
      const minGap = 30 * dpr; // Minimum width required to draw text
      
      const targetHeight = Math.min(450 * dpr, canvas.height * 0.7);
      const ratio = video.videoWidth / video.videoHeight;
      const targetWidth = targetHeight * ratio;
      
      const videoX = (canvas.width - targetWidth) / 2; 
      const videoY = canvas.height - targetHeight; 
      
      ctx.drawImage(video, videoX, videoY, targetWidth, targetHeight); 
      
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      
      if (dropCapChar) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
        ctx.font = dropCapFont;
        ctx.fillText(dropCapChar, margin, margin + (lineHeight * 2));
      }

      let currentY = margin; 
      let textCursor = { segmentIndex: 0, graphemeIndex: 0 }; 
      const dropCapBottomY = margin + (lineHeight * 2); 

      while (currentY < canvas.height - margin) {
        
        let lineStartX = margin; 
        if (currentY <= dropCapBottomY && dropCapChar) {
            lineStartX = margin + dropCapWidth + (8 * dpr); 
        }

        const yChecks = [currentY - (18 * dpr), currentY - (9 * dpr), currentY];
        let leftHit = canvas.width; 
        let rightHit = 0; 
        
        for (let y of yChecks) {
          const scanY = Math.floor(y);
          if (scanY > 0) {
            for (let x = lineStartX; x < canvas.width - margin; x++) {
              const alphaIndex = (scanY * canvas.width + x) * 4 + 3;
              if (imageData[alphaIndex] > 50) { 
                if (x < leftHit) leftHit = x; 
                break; 
              }
            }
            for (let x = canvas.width - margin; x >= lineStartX; x--) {
              const alphaIndex = (scanY * canvas.width + x) * 4 + 3;
              if (imageData[alphaIndex] > 50) { 
                if (x > rightHit) rightHit = x; 
                break; 
              }
            }
          }
        }
        
        ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
        ctx.font = fontStyle;
        const padding = (isMobile ? 12 : 20) * dpr; 

        if (leftHit < canvas.width && rightHit > 0 && leftHit <= rightHit) {
          
          let leftWidth = leftHit - lineStartX - padding;
          if (leftWidth > minGap) { 
            const leftLine = layoutNextLine(preparedText, textCursor, leftWidth);
            if (leftLine === null) break; 
            ctx.fillText(leftLine.text, lineStartX, currentY);
            textCursor = leftLine.end;
          }

          let rightStartX = rightHit + padding;
          let rightWidth = (canvas.width - margin) - rightStartX;
          if (rightWidth > minGap) {
            const rightLine = layoutNextLine(preparedText, textCursor, rightWidth);
            if (rightLine === null) break;
            ctx.fillText(rightLine.text, rightStartX, currentY);
            textCursor = rightLine.end;
          }
          
        } else {
          let fullWidth = (canvas.width - margin) - lineStartX; 
          const line = layoutNextLine(preparedText, textCursor, fullWidth);
          if (line === null) break;
          ctx.fillText(line.text, lineStartX, currentY);
          textCursor = line.end;
        }
        
        currentY += lineHeight;
      }

      requestAnimationFrame(renderFrame);
    }
  </script>
</body>
</html>

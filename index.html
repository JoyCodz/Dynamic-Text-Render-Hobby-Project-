<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext Dynamic Wrap - Wiki Drop Cap</title>
  <style>
    body {
      background-color: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      overflow: hidden;
    }
    canvas {
      background-color: #222;
      border: 1px solid #444;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    video { display: none; }
    
    #start-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    #start-btn {
      padding: 15px 40px;
      font-size: 24px;
      font-weight: bold;
      background: #ff4757;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
      transition: transform 0.2s, background-color 0.2s;
    }
    #start-btn:hover:not(:disabled) { transform: scale(1.05); }
    
    #start-btn:disabled {
      background: #555;
      cursor: not-allowed;
      box-shadow: none;
    }
  </style>
</head>
<body>

  <audio id="bgm" src="song.mp3" loop></audio>
  <video id="dancer" src="chika_dance.webm" loop autoplay muted playsinline></video>
  <canvas id="stage" width="800" height="600"></canvas>

  <div id="start-screen">
    <button id="start-btn" disabled>Loading Wikipedia...</button>
  </div>

  <script type="module">
    import { prepareWithSegments, layoutNextLine } from "https://esm.sh/@chenglou/pretext";

    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const video = document.getElementById("dancer");
    const audio = document.getElementById("bgm");
    const startScreen = document.getElementById("start-screen");
    const startBtn = document.getElementById("start-btn");

    const fontStyle = "16px Inter, system-ui, sans-serif";
    const lineHeight = 26;
    
    // --- NEW: Drop Cap Variables ---
    const dropCapFont = "bold 76px Georgia, serif";
    let dropCapChar = "";
    let dropCapWidth = 0;
    let preparedText = null; 

    async function loadWikipediaText() {
      try {
        const url = "https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&generator=random&grnnamespace=0&prop=extracts&explaintext=1&exchars=3000";
        const response = await fetch(url);
        const data = await response.json();
        
        const pages = data.query.pages;
        const pageId = Object.keys(pages)[0];
        let text = pages[pageId].extract;

        text = text.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
        if (text.length < 2000) text = text.repeat(3);

        // --- NEW: Extract the first actual letter for the Drop Cap ---
        // We use a regex to skip any leading quotation marks or brackets
        const match = text.match(/[a-zA-Z]/);
        if (match) {
          dropCapChar = text.charAt(match.index).toUpperCase();
          text = text.substring(match.index + 1); // Keep the rest of the text
          
          // Measure how wide this specific letter is
          ctx.font = dropCapFont;
          dropCapWidth = ctx.measureText(dropCapChar).width;
        }

        preparedText = prepareWithSegments(text, fontStyle);
        startBtn.innerText = "Click to Start";
        startBtn.disabled = false;

      } catch (error) {
        console.error("Failed to load Wikipedia:", error);
        startBtn.innerText = "Error loading. Refresh page.";
      }
    }

    loadWikipediaText();

    startBtn.addEventListener("click", () => {
      if (!preparedText) return; 
      startScreen.style.display = "none";
      video.currentTime = 0; 
      audio.play();
      requestAnimationFrame(renderFrame);
    });

    function renderFrame() {
      if (video.videoWidth === 0 || video.videoHeight === 0) {
        requestAnimationFrame(renderFrame);
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const targetHeight = 450;
      const ratio = video.videoWidth / video.videoHeight;
      const targetWidth = targetHeight * ratio;
      
      const videoX = (canvas.width - targetWidth) / 2; 
      const videoY = canvas.height - targetHeight; 
      
      ctx.drawImage(video, videoX, videoY, targetWidth, targetHeight); 
      
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      
      // --- NEW: Draw the Drop Cap ---
      if (dropCapChar) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
        ctx.font = dropCapFont;
        // Draw it so its baseline aligns perfectly with the 3rd line of text
        ctx.fillText(dropCapChar, 40, 40 + (lineHeight * 2));
      }

      let currentY = 40; 
      let textCursor = { segmentIndex: 0, graphemeIndex: 0 }; 
      const dropCapBottomY = 40 + (lineHeight * 2); // Defines how far down the drop cap reaches

      while (currentY < canvas.height - 40) {
        
        // --- NEW: Indent logic for the Drop Cap ---
        let lineStartX = 40; // Default starting X position
        // If we are on the top 3 lines, push the text right to avoid the big letter
        if (currentY <= dropCapBottomY && dropCapChar) {
            lineStartX = 40 + dropCapWidth + 8; // 8px of padding after the letter
        }

        const yChecks = [currentY - 18, currentY - 9, currentY];
        let leftHit = canvas.width; 
        let rightHit = 0; 
        
        for (let y of yChecks) {
          const scanY = Math.floor(y);
          if (scanY > 0) {
            // Scanner A: Starts at our new dynamic lineStartX!
            for (let x = lineStartX; x < canvas.width - 40; x++) {
              const alphaIndex = (scanY * canvas.width + x) * 4 + 3;
              if (imageData[alphaIndex] > 50) { 
                if (x < leftHit) leftHit = x; 
                break; 
              }
            }
            
            // Scanner B: Right-to-Left
            for (let x = canvas.width - 40; x >= lineStartX; x--) {
              const alphaIndex = (scanY * canvas.width + x) * 4 + 3;
              if (imageData[alphaIndex] > 50) { 
                if (x > rightHit) rightHit = x; 
                break; 
              }
            }
          }
        }
        
        // Switch back to our normal font before drawing the paragraph text
        ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
        ctx.font = fontStyle;
        const padding = 20;

        if (leftHit < canvas.width && rightHit > 0 && leftHit <= rightHit) {
          
          // Draw Left Gap
          let leftWidth = leftHit - lineStartX - padding;
          if (leftWidth > 30) { 
            const leftLine = layoutNextLine(preparedText, textCursor, leftWidth);
            if (leftLine === null) break; 
            ctx.fillText(leftLine.text, lineStartX, currentY);
            textCursor = leftLine.end;
          }

          // Draw Right Gap
          let rightStartX = rightHit + padding;
          let rightWidth = (canvas.width - 40) - rightStartX;
          if (rightWidth > 30) {
            const rightLine = layoutNextLine(preparedText, textCursor, rightWidth);
            if (rightLine === null) break;
            ctx.fillText(rightLine.text, rightStartX, currentY);
            textCursor = rightLine.end;
          }
          
        } else {
          // Missed the character
          let fullWidth = (canvas.width - 40) - lineStartX; 
          const line = layoutNextLine(preparedText, textCursor, fullWidth);
          if (line === null) break;
          ctx.fillText(line.text, lineStartX, currentY);
          textCursor = line.end;
        }
        
        currentY += lineHeight;
      }

      requestAnimationFrame(renderFrame);
    }
  </script>
</body>
</html>
